<!DOCTYPE html>
<html lang="es">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LEGALTEC - CONTROL HUB</title>
    <!-- FontAwesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent-admin: #3b82f6;
            --accent-success: #10b981;
            --accent-error: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* BARRA LATERAL (MENU) */
        .sidebar {
            width: 260px;
            background: #111827;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: fixed;
            height: 100vh;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .sidebar-header h1, 
        .sidebar.collapsed .sidebar-header p, 
        .sidebar.collapsed .navbar a span { display: none; }
        .sidebar.collapsed .navbar a { justify-content: center; padding: 12px 0; }
        .sidebar.collapsed .navbar a i { margin: 0; }

        .sidebar-header {
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-admin);
        }

        .navbar {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 4px;
        }

        .navbar a {
            text-decoration: none;
            color: var(--text-muted);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .navbar a i { width: 20px; text-align: center; }

        .navbar a:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .navbar a.active {
            background: var(--accent-admin);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 24px;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            transition: margin-left 0.3s ease;
        }
        .main-content.expanded { margin-left: 70px; }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .view-title { font-size: 1.5rem; font-weight: 700; }

        .btn-add {
            background: var(--accent-success);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover { filter: brightness(1.1); }

        /* TABLA UNIVERSAL */
        .table-container {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.8rem; }
        th { background: rgba(0,0,0,0.2); padding: 10px; color: var(--text-muted); text-transform: uppercase; font-size: 0.70rem; letter-spacing: 1px; }
        td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(255,255,255,0.02); }

        .advanced-filter {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 6px;
            outline: none;
            font-size: 0.8rem;
        }
        tr:hover { background: rgba(255,255,255,0.02); }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .actions { display: flex; gap: 8px; }
        .btn-action {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .btn-action:hover { background: var(--accent-admin); }
        .btn-action.blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-color: rgba(59, 130, 246, 0.3); }
        .btn-action.blue:hover { background: #3b82f6; color: white; }
        .btn-action.red { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .btn-action.red:hover { background: #ef4444; color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* MODALS */
        .modal {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal.open { display: flex; }
        .modal-body {
            background: var(--bg-card);
            width: 95%;
            max-width: 900px; /* Matching Supervisor Modal Width */
            padding: 32px;
            border-radius: 20px;
            overflow-y: auto;
            max-height: 90vh;
            position: relative;
        }

        .modal-body h3 {
            margin-bottom: 24px;
            font-size: 1.25rem;
            color: var(--accent-admin);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .form-group label {
            display: block;
            margin-bottom: 2px;
            color: var(--text-muted);
            font-size: 0.70rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 6px 8px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: white;
            font-size: 0.85rem;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        /* Responsive grid */
        @media (max-width: 800px) {
            .form-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Estilos Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar-header h1, .navbar a span { display: none; }
            .main-content { margin-left: 70px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>LEGALTEC</h1>
            <p style="font-size: 0.6rem; color: var(--text-muted);">ADMIN CONTROL</p>
        </div>
        <nav class="navbar" id="mainNav">
            <a href="#" class="active" onclick="switchView(event, 'home', this)"><i class="fa fa-home"></i> <span>Home</span></a>
            <a href="#" onclick="switchView(event, 'Registros', this)"><i class="fa fa-database"></i> <span>Tabla Principal</span></a>
            <a href="#" onclick="switchView(event, 'Usuarios', this)"><i class="fa fa-users"></i> <span>Usuarios</span></a>
            <a href="#" onclick="switchView(event, 'Documentos', this)"><i class="fa fa-file-text"></i> <span>Documentos</span></a>
            <a href="#" onclick="switchView(event, 'Requerimientos', this)"><i class="fa fa-tasks"></i> <span>Requerimientos</span></a>
            <a href="#" onclick="switchView(event, 'Autoridades', this)"><i class="fa fa-vcard"></i> <span>Autoridades</span></a>
            <a href="#" onclick="switchView(event, 'Auxiliares', this)"><i class="fa fa-briefcase"></i> <span>Auxiliares</span></a>
            <div style="margin-top: auto; padding: 10px;">
                <a href="#" onclick="event.preventDefault(); logout();" style="color: var(--accent-error);"><i class="fa fa-sign-out"></i> <span>Salir</span></a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="view-header" style="margin-bottom: 20px;">
            <div style="display:flex; align-items:center; gap:15px;">
                <button onclick="toggleSidebar()" style="background:transparent; border:none; color:var(--text-muted); font-size:1.5rem; cursor:pointer;"><i class="fa fa-bars"></i></button>
                <h2 class="view-title" id="viewTitle">Dashboard Admin</h2>
            </div>
        </header>

        <!-- DASHBOARD HOME COMPACTO -->
        <div id="view-home" style="margin-bottom: 30px;">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
                <div class="table-container" style="padding: 15px; display: flex; align-items: center; gap: 15px;">
                    <i class="fa fa-database" style="font-size: 1.8rem; color: var(--accent-admin); padding: 10px; background: rgba(59,130,246,0.1); border-radius: 10px;"></i>
                    <div>
                        <h3 style="font-size: 1rem; margin-bottom: 4px;">Base de Datos</h3>
                        <p style="color: var(--text-muted); font-size: 0.75rem;">Gestión Firestore RTC</p>
                    </div>
                </div>
                <div class="table-container" style="padding: 15px; display: flex; align-items: center; gap: 15px;">
                    <i class="fa fa-shield" style="font-size: 1.8rem; color: var(--accent-success); padding: 10px; background: rgba(16,185,129,0.1); border-radius: 10px;"></i>
                    <div>
                        <h3 style="font-size: 1rem; margin-bottom: 4px;">Seguridad 2FA</h3>
                        <p style="color: var(--text-muted); font-size: 0.75rem;">Acceso Restringido</p>
                    </div>
                </div>
                <div class="table-container" style="padding: 15px; display: flex; align-items: center; gap: 15px;">
                    <i class="fa fa-history" style="font-size: 1.8rem; color: var(--accent-error); padding: 10px; background: rgba(239,68,68,0.1); border-radius: 10px;"></i>
                    <div>
                        <h3 style="font-size: 1rem; margin-bottom: 4px;">Logs Auditoría</h3>
                        <p style="color: var(--text-muted); font-size: 0.75rem;">Traza de movimientos</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- TABLA DINAMICA -->
        <div id="view-table" style="display:none; animation: fadeIn 0.3s ease;">
            <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <div style="display: flex; align-items: center; gap: 10px; width: 100%; max-width: 300px; background: rgba(0,0,0,0.2); padding: 0 15px; border-radius: 8px; border: 1px solid var(--border);">
                        <i class="fa fa-search" style="color: var(--text-muted);"></i>
                        <input type="text" id="adminSearchInput" placeholder="Buscar general..." style="padding: 10px 5px; border: none; background: transparent; color: white; width: 100%; outline: none;" onkeyup="filterAdminTable()">
                    </div>
                    
                    <div id="dynamicFilters" style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <!-- Filtros auto generados -->
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button class="btn-action blue" onclick="syncAllCollections()" id="btnSyncAll" title="Sincronizar Firestore con Google Sheets">
                            <i class="fa fa-refresh"></i> <span style="margin-left:5px;">Sincronizar Todo</span>
                        </button>
                        <button class="btn-action red" id="btnBulkDelete" style="display:none;" onclick="bulkDeleteSelected()">
                            <i class="fa fa-trash"></i> <span style="margin-left:5px;">Borrar Sel. (<span id="bulkCount">0</span>)</span>
                        </button>
                        <button class="btn-add" id="btnAddRecord" onclick="showAddModal()">
                            <i class="fa fa-plus"></i> <span style="margin-left: 5px;">Nuevo Registro</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="table-container" style="overflow-x: auto; max-height: calc(100vh - 220px);">
                <table id="dynamicTable">
                    <thead id="tableHead" style="position: sticky; top: 0; z-index: 10; background: var(--bg-card); box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Base Universal -->
    <div class="modal" id="modalCRUD">
        <div class="modal-body">
            <h3 id="modalTitle">Registro</h3>
            <form id="crudForm" onsubmit="event.preventDefault(); submitForm();">
                <div id="formFields" class="form-grid"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-add">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentCollection = '';
        let currentData = [];

        // Seguridad básica (Si no es admin, fuera)
        const cdRol = localStorage.getItem('cd_rol') || '';
        if(!cdRol.toLowerCase().includes('admin')) {
            alert('Acceso no autorizado');
            window.top.location.href = '<?!= getAppUrl(); ?>?page=LoginCD';
        }

        function switchView(e, collection, el) {
            e.preventDefault();
            // UI
            document.querySelectorAll('.navbar a').forEach(a => a.classList.remove('active'));
            if(el) el.classList.add('active');

            if (collection === 'home') {
                document.getElementById('view-table').style.display = 'none';
                document.getElementById('viewTitle').textContent = 'Dashboard Admin';
                return;
            }

            // Muestra la tabla debajo del dashboard
            document.getElementById('view-table').style.display = 'block';
            document.getElementById('viewTitle').textContent = 'Gestión: ' + collection;
            
            // Limpia el buscador actual
            const searchInput = document.getElementById('adminSearchInput');
            if (searchInput) searchInput.value = '';
            
            currentCollection = collection;
            loadCollection(collection);
        }

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('collapsed');
            document.querySelector('.main-content').classList.toggle('expanded');
        }

        function filterAdminTable() {
            const term = document.getElementById('adminSearchInput').value.toLowerCase();
            const selects = document.querySelectorAll('.advanced-filter');
            const headerCells = Array.from(document.querySelectorAll('#tableHead th')).map(th => th.textContent);
            
            const trs = document.querySelectorAll('#tableBody tr');
            trs.forEach(tr => {
                let matchFilters = true;
                
                selects.forEach(select => {
                    const colName = select.dataset.colName;
                    const filterVal = select.value.toLowerCase();
                    if (filterVal) {
                         const idx = headerCells.indexOf(colName);
                         if(idx > -1) {
                             const cellValue = tr.children[idx].textContent.toLowerCase();
                             if (!cellValue.includes(filterVal)) {
                                 matchFilters = false;
                             }
                         }
                    }
                });

                const matchTerm = tr.textContent.toLowerCase().includes(term);
                tr.style.display = (matchFilters && matchTerm) ? '' : 'none';
            });
            updateBulkDeleteBtn();
        }

        function buildDynamicFilters(data, keys) {
            const filterContainer = document.getElementById('dynamicFilters');
            filterContainer.innerHTML = '';
            
            const interestingKeys = ['AUTORIDAD', 'USUARIO', 'ESTADO'];
            interestingKeys.forEach(key => {
                if(keys.includes(key)) {
                    const unique = [...new Set(data.map(item => item[key]))].filter(v => v);
                    if(unique.length > 0) {
                        const select = document.createElement('select');
                        select.className = 'advanced-filter';
                        select.dataset.colName = key;
                        select.innerHTML = `<option value="">Todos los ${key}</option>`;
                        unique.sort().forEach(val => { select.innerHTML += `<option value="${val}">${val}</option>`; });
                        select.onchange = filterAdminTable;
                        filterContainer.appendChild(select);
                    }
                }
            });
            
            const dateKey = keys.find(k => k.includes('FECHA'));
            if(dateKey) {
                const dates = data.map(i => i[dateKey]).filter(v => v);
                const uniqueDates = [...new Set(dates.map(d => {
                    const match = String(d).match(/(\d{4})-(\d{2})/);
                    return match ? match[0] : String(d).substring(0, 7);
                }))].filter(v => v && v.length > 4); 

                if(uniqueDates.length > 0) {
                    const select = document.createElement('select');
                    select.className = 'advanced-filter';
                    select.dataset.colName = dateKey;
                    select.innerHTML = `<option value="">Todas las Fechas</option>`;
                    uniqueDates.sort().reverse().forEach(val => { select.innerHTML += `<option value="${val}">${val}</option>`; });
                    select.onchange = filterAdminTable;
                    filterContainer.appendChild(select);
                }
            }
        }

        function syncAllCollections() {
            const btn = document.getElementById('btnSyncAll');
            const originalHtml = btn.innerHTML;
            if(!confirm('¿Desea forzar una sincronización completa de todas las tablas desde Google Sheets a Firebase? (Este proceso puede tardar unos segundos)')) return;
            
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Sincronizando...';
            btn.disabled = true;

            google.script.run.withSuccessHandler(res => {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                if(res.ok) {
                    alert('Sincronización completada con éxito.');
                    if(currentCollection && currentCollection !== 'home') loadCollection(currentCollection);
                } else {
                    alert('Error en sincronización: ' + res.message);
                }
            }).adminActionSyncAll();
        }

        function loadCollection(name) {
            const body = document.getElementById('tableBody');
            const head = document.getElementById('tableHead');
            body.innerHTML = '<tr><td colspan="15" style="text-align:center;">Cargando colección ' + name + '...</td></tr>';
            head.innerHTML = '';
            document.getElementById('dynamicFilters').innerHTML = ''; // reset

            google.script.run.withSuccessHandler(res => {
                if (res.ok) {
                    currentData = res.data;
                    renderTable(res.data);
                    const keys = Object.keys(res.data[0] || {}).filter(k => k !== '__id');
                    buildDynamicFilters(res.data, keys);
                } else {
                    body.innerHTML = '<tr><td colspan="15">Error: ' + res.message + '</td></tr>';
                }
            }).adminActionGet(name);
        }

        function toggleAllChecks(master) {
            const checks = document.querySelectorAll('.row-check');
            checks.forEach(c => {
                if (c.closest('tr').style.display !== 'none') c.checked = master.checked;
            });
            updateBulkDeleteBtn();
        }

        function updateBulkDeleteBtn() {
            const checks = document.querySelectorAll('.row-check:checked');
            const btn = document.getElementById('btnBulkDelete');
            const countLabel = document.getElementById('bulkCount');
            if (checks.length > 0) {
                btn.style.display = 'inline-flex';
                countLabel.textContent = checks.length;
            } else {
                btn.style.display = 'none';
            }
        }

        function bulkDeleteSelected() {
            const checks = document.querySelectorAll('.row-check:checked');
            if (checks.length === 0) return;
            if (!confirm(`¿Eliminar MÚLTIPLES (${checks.length}) registros? Esto es IRREVERSIBLE.`)) return;
            
            const ids = Array.from(checks).map(c => c.value);
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="15" style="text-align:center;"><i class="fa fa-spinner fa-spin"></i> Eliminando ${checks.length} registros...</td></tr>`;
            
            google.script.run.withSuccessHandler(res => {
                if (res.ok) {
                    loadCollection(currentCollection);
                } else {
                    alert('Error: ' + res.message);
                    loadCollection(currentCollection);
                }
            }).adminActionBulkDelete(currentCollection, ids);
        }

        function renderTable(data) {
            if (!data || data.length === 0) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="15" style="text-align:center;">No hay datos en esta colección.</td></tr>';
                return;
            }

            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            
            const keys = Object.keys(data[0]).filter(k => k !== '__id');
            
            let headHtml = '<tr><th style="width: 30px;"><input type="checkbox" id="selectAll" onclick="toggleAllChecks(this)"></th>';
            keys.forEach(k => headHtml += '<th>' + k + '</th>');
            headHtml += '<th style="text-align:right;">Acciones</th></tr>';
            head.innerHTML = headHtml;

            let bodyHtml = '';
            data.forEach(row => {
                bodyHtml += '<tr style="transition: background 0.2s;">';
                bodyHtml += `<td><input type="checkbox" class="row-check" value="${row.__id}" onclick="updateBulkDeleteBtn()"></td>`;
                keys.forEach(k => {
                    let cellVal = row[k];
                    if (cellVal === undefined || cellVal === null) cellVal = '';
                    if (typeof cellVal === 'boolean') {
                        cellVal = cellVal ? '<span class="badge" style="background:var(--accent-success);color:white;">SI</span>' : '<span class="badge" style="background:var(--accent-error);color:white;">NO</span>';
                    }
                    bodyHtml += `<td>${cellVal}</td>`;
                });
                bodyHtml += `<td style="text-align:right; white-space:nowrap;">
                    <button class="btn-action blue" onclick="showEditModal('${row.__id}')" title="Editar"><i class="fa fa-pencil"></i></button>
                    <button class="btn-action red" onclick="deleteRecord('${row.__id}')" title="Eliminar"><i class="fa fa-trash"></i></button>
                </td></tr>`;
            });
            body.innerHTML = bodyHtml;
            updateBulkDeleteBtn(); 
        }

        function deleteRecord(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar permanentemente el registro ' + id + '? Esta acción no se puede deshacer.')) return;
            
            // Feedback UI
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" style="text-align:center;"><i class="fa fa-spinner fa-spin"></i> Eliminando registro...</td></tr>';
            
            google.script.run.withSuccessHandler(res => {
                if (res.ok) {
                    loadCollection(currentCollection);
                } else {
                    alert('Error: ' + res.message);
                    loadCollection(currentCollection);
                }
            }).adminActionDelete(currentCollection, id);
        }

        function showEditModal(id) {
            const doc = currentData.find(d => d.__id === id);
            if (!doc) return;

            document.getElementById('modalTitle').textContent = 'Editar Registro: ' + id;
            let fieldsHtml = '';
            Object.keys(doc).forEach(k => {
                if (k === '__id') return;
                fieldsHtml += `
                    <div class="form-group">
                        <label>${k}</label>
                        <input type="text" name="${k}" value="${doc[k] || ''}">
                    </div>
                `;
            });
            document.getElementById('formFields').innerHTML = fieldsHtml;
            document.getElementById('modalCRUD').classList.add('open');
            window.editingId = id;
            window.isEditing = true;
        }

        function getNextCorrelativeId(key, prefix) {
            let maxNumber = 0;
            currentData.forEach(item => {
               let val = String(item[key] || '');
               let numStr = val.replace(/\D/g, ''); // Extract only digits
               let num = parseInt(numStr, 10);
               if(!isNaN(num) && num > maxNumber) {
                   maxNumber = num;
               }
            });
            return prefix + (maxNumber + 1);
        }

        function showAddModal() {
            if (!currentData || currentData.length === 0) {
                alert('No se puede determinar la estructura. Agrega un dato manualmente al Sheet primero.');
                return;
            }
            document.getElementById('modalTitle').textContent = 'Nuevo Registro en ' + currentCollection;
            let fieldsHtml = '';
            Object.keys(currentData[0]).forEach(k => {
                if (k === '__id') return;

                let defaultVal = '';
                
                // --- Autogeneración inteligente y correlativa ---
                if (k === 'ID_REG') {
                    defaultVal = getNextCorrelativeId('ID_REG', 'RL');
                } else if (k === 'ID_REQ') {
                    defaultVal = getNextCorrelativeId('ID_REQ', 'REQ-');
                } else if (k === 'ID_USER' || k === 'ID_USER_CD') {
                    defaultVal = getNextCorrelativeId(k, '');
                } else if (k === 'ID_AUT') {
                    defaultVal = getNextCorrelativeId('ID_AUT', '');
                } else if (k === 'ID_AUX') {
                    defaultVal = getNextCorrelativeId('ID_AUX', '');
                } else if (k.includes('FECHA_CARGA') || k.includes('FECHA ALTA') || k.includes('FECHA DE ALTA')) {
                    const d = new Date();
                    defaultVal = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                } else if (k === 'STATUS') {
                    defaultVal = 'true';
                } else if (k === 'ESTADO' && currentCollection === 'Registros') {
                    defaultVal = 'Pendiente Carga';
                }

                fieldsHtml += `
                    <div class="form-group">
                        <label>${k}</label>
                        <input type="text" name="${k}" value="${defaultVal}">
                    </div>
                `;
            });
            document.getElementById('formFields').innerHTML = fieldsHtml;
            document.getElementById('modalCRUD').classList.add('open');
            window.isEditing = false;
        }

        function submitForm() {
            const form = document.getElementById('crudForm');
            const inputs = form.querySelectorAll('input');
            const data = {};
            inputs.forEach(i => data[i.name] = i.value);

            let docId = window.isEditing ? window.editingId : null;
            if(!docId) {
                docId = data.ID_REG || data.ID_REQ || data.ID_USER || data.ID_AUT || data.ID_AUX || data.DOC_ID || data.USUARIO || data.ID || Date.now().toString();
            }

            google.script.run.withSuccessHandler(res => {
                if (res.ok) {
                    closeModal();
                    loadCollection(currentCollection);
                } else {
                    alert('Error: ' + res.message);
                }
            }).adminActionSave(currentCollection, docId, data);
        }

        function closeModal() { document.getElementById('modalCRUD').classList.remove('open'); }

        function logout() {
            localStorage.clear();
            window.top.location.href = '<?!= getAppUrl(); ?>?page=LoginCD';
        }
    </script>
</body>
</html>
