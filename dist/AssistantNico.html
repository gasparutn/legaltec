<style>
  /* Nico Assistant Styles */
  #nico-assistant-container {
    position: fixed;
    bottom: 20px;
    right: 20px !important;
    left: auto !important;
    z-index: 10000;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    pointer-events: none;
    user-select: none;
  }

  #nico-assistant-container * {
    pointer-events: auto;
  }

  .nico-avatar {
    width: 85px;
    height: 85px;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border-radius: 50%;
    border: 4px solid #3b82f6;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    animation: entrance 1s ease-out;
  }

  .nico-avatar:hover {
    transform: scale(1.05) translateY(-5px);
    box-shadow: 0 15px 40px rgba(59, 130, 246, 0.5);
  }

  .nico-avatar.greeting {
    animation: wave 1.2s ease-in-out infinite;
  }

  @keyframes wave {
    0%, 100% { transform: rotate(0deg); }
    20% { transform: rotate(10deg); }
    40% { transform: rotate(-8deg); }
    60% { transform: rotate(6deg); }
    80% { transform: rotate(-4deg); }
  }

  /* Robot Image styling - Ensure visibility */
  .nico-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Use cover to fill circle */
    border-radius: 50%;
    display: block;
    background: transparent;
  }

  .nico-bubble {
    background: #ffffff;
    padding: 15px 20px;
    border-radius: 18px;
    border-bottom-right-radius: 4px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    margin-bottom: 15px;
    max-width: 280px;
    position: relative;
    opacity: 0;
    visibility: hidden;
    transform: translateY(20px) scale(0.9);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    color: #1e293b;
    font-size: 14px;
    line-height: 1.4;
    border: 1px solid #e2e8f0;
    text-align: center;
    cursor: pointer; /* Suggests clicking to close */
  }

  .nico-bubble.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
  }

  .nico-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    right: 15px;
    width: 15px;
    height: 15px;
    background: #ffffff;
    border-right: 1px solid #e2e8f0;
    border-bottom: 1px solid #e2e8f0;
    transform: rotate(45deg);
  }

  #chatBadgeUnread {
    position: absolute;
    top: 5px;
    left: 5px;
    background: #ef4444;
    color: white;
    font-size: 11px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 12px;
    border: 2px solid white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    display: none;
    z-index: 101;
  }

  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 5px 0;
    justify-content: center;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: #94a3b8;
    border-radius: 50%;
    animation: dot-bounce 1.4s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  @keyframes entrance {
    from { opacity: 0; transform: scale(0.5) translateY(50px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
</style>

<div id="nico-assistant-container">
  <div id="nico-speech-bubble" class="nico-bubble" onclick="closeNicoBubble()">
    <div id="nico-message-content">
      <div class="typing-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="nico-avatar" id="nico-avatar-btn" onclick="handleNicoClick()">
    <div id="chatBadgeUnread">0</div>
    <!-- New verified professional robot icon - Simplified URL for performance -->
    <img src="https://img.icons8.com/isometric/100/bot.png" alt="" id="nico-avatar-img">
  </div>
</div>


<script>
  (function() {
    const bubble = document.getElementById('nico-speech-bubble');
    const content = document.getElementById('nico-message-content');
    const avatar = document.getElementById('nico-avatar-btn');

    const GREETING_TEXT = "¡Hola!, soy el Nico controlador. ¡Pinchame y conversamos!";

    window.closeNicoBubble = function() {
      bubble.classList.remove('show');
    };

    window.handleNicoClick = function() {
      closeNicoBubble();
      if (typeof toggleChatWindow === 'function') {
        toggleChatWindow();
      }
    };

    function showGreeting() {
      // Check if we already greeted this session
      if (sessionStorage.getItem('nico_greeted_v2')) return;

      bubble.classList.add('show');
      avatar.classList.add('greeting');

      setTimeout(() => {
        content.innerHTML = `<div style="font-weight: 600; color: #1e293b;">${GREETING_TEXT}</div>`;
      }, 1500);
      
      setTimeout(() => {
        avatar.classList.remove('greeting');
      }, 6000);

      // Mark as greeted
      sessionStorage.setItem('nico_greeted_v2', 'true');
    }

    setTimeout(showGreeting, 2500);
  })();

  function updateNicoBadge(count) {
    const badge = document.getElementById('chatBadgeUnread');
    if (badge) {
      badge.innerText = count;
      badge.style.display = count > 0 ? 'flex' : 'none';
      badge.style.justifyContent = 'center';
      badge.style.alignItems = 'center';
    }
  }
</script>
