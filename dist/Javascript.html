    /**
     * Convierte cualquier formato de fecha a YYYY-MM-DD para inputs de tipo date
     */
    function formatDateForInput(val) {
      if (!val) return '';
      const str = String(val).trim();

      // Caso 1: Formato YYYY-MM-DD (ISO) — ya está correcto
      if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;

      // Caso 2: Formato DD-MM-YYYY o DD/MM/YYYY (soporta si viene con hora o espacios extra)
      const parts = str.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})/);
      if (parts) {
        const d = parts[1].padStart(2, '0');
        const m = parts[2].padStart(2, '0');
        const y = parts[3];
        return `${y}-${m}-${d}`;
      }

      // Caso 3: Objeto Date o cadena de fecha nativa
      const d = new Date(val);
      if (!isNaN(d.getTime())) {
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const dy = String(d.getDate()).padStart(2, '0');
        return `${y}-${mo}-${dy}`;
      }

      return ''; // Si no pudo parsear, mejor devolver vacío que un valor inválido que bloquee el campo
    }

    /**
     * Actualiza visualmente el indicador de sincronización
     * @param {'syncing' | 'success' | 'error' | 'idle'} status 
     */
    function updateSyncStatus(status, customMsg = null) {
      const indicator = document.getElementById('syncIndicator');
      if (!indicator) return;

      indicator.classList.remove('syncing', 'sync-success', 'sync-error');

      switch (status) {
        case 'syncing':
          indicator.textContent = customMsg || 'Sincronizando...';
          indicator.classList.add('syncing');
          break;
        case 'success':
          indicator.textContent = customMsg || '✓ Sincronizado';
          indicator.classList.add('sync-success');
          break;
        case 'error':
          indicator.textContent = customMsg || '⚠ Error Red';
          indicator.classList.add('sync-error');
          break;
        case 'idle':
          indicator.textContent = customMsg || 'En espera';
          indicator.classList.remove('syncing', 'sync-success', 'sync-error');
          break;
      }
    }



    function refreshTareasSelect(forcedSelectedValue) {
      // Actualiza solo el SELECT de TAREAS sin cerrar el modal ni recargar todo
      const ts = new Date().getTime(); // Cache buster
      google.script.run
        .withSuccessHandler(tareas => {
          if (tareas && tareas.length > 0) {
            CONFIG.SELECT_COLUMNS['TAREAS'] = ['', ...tareas];
          }
          const tareasSelect = document.getElementById('TAREAS');
          if (tareasSelect) {
            const currentVal = forcedSelectedValue || tareasSelect.value;
            tareasSelect.innerHTML = '';
            CONFIG.SELECT_COLUMNS['TAREAS'].forEach(v => {
              const o = document.createElement('option');
              o.value = v;
              o.textContent = v;
              tareasSelect.appendChild(o);
            });
            // Intentar recuperar el valor anterior si sigue existiendo
            let found = false;
            Array.from(tareasSelect.options).forEach(opt => {
              if (opt.value.trim().toUpperCase() === currentVal.trim().toUpperCase()) {
                opt.selected = true;
                found = true;
              }
            });
            // Si no encontramos el valor anterior, dejar el primero seleccionado
            if (!found && tareasSelect.options.length > 0) {
              tareasSelect.options[0].selected = true;
            }
          }
        })
        .withFailureHandler(err => console.error("Error al refrescar TAREAS: " + err))
        .getTareasList(ts);
    }

    function refreshAutoridadesSelect(forcedSelectedValue) {

        .withSuccessHandler(autoridadesFromServer => {
          // Fusionar lista del servidor con opciones predefinidas, garantizando VICE y LEGISLATIVA
          const PREDEFINED_AUTORIDADES = [
            'ADM', 'ANA', 'ASES', 'BARRO', 'CANO', 'CHAPPEL', 'DERRACHE', 'DIUMENJO',
            'EISENCHLAS', 'FLORIDIA', 'FREIDEMBERG', 'GALI\u00d1ARES', 'G\u00d3MEZ', 'GONZ\u00c1LEZ F.',
            'GONZ\u00c1LEZ V.', 'IGLESIAS', 'KERCHNER', 'LAFERTE', 'LEGISLATIVA', 'MAGISTRETTI',
            'MANONI', 'MARCOLINI', 'MARQUEZ', 'NAJUL', 'PERVIU', 'PEZZUTTI', 'PRADINES',
            'PRINGLES', 'QUATTRINI', 'ROSTAND', 'RUS', 'SABADIN', 'S\u00c1EZ', 'SAINZ', 'SAT',
            'SERRA', 'SEVILLA', 'SOTO', 'VAQUER', 'VICCHI', 'VICE', 'ZLOBEC'
          ];

          if (autoridadesFromServer && Object.keys(autoridadesFromServer).length > 0) {
            autoridadesConfig = autoridadesFromServer;
          }

          // Combinar: servidor + predefinidas, sin duplicados
          const serverKeys = Object.keys(autoridadesConfig).map(k => k.toUpperCase());
          const allKeys = new Set([...serverKeys, ...PREDEFINED_AUTORIDADES]);
          const apellidosList = Array.from(allKeys).sort();
          CONFIG.SELECT_COLUMNS['AUTORIDAD'] = ['', ...apellidosList];

          const autoridadSelect = document.getElementById('AUTORIDAD');
          if (autoridadSelect && autoridadSelect.closest('form')) { // Solo si est\u00e1 en el modal abierto
            const currentVal = forcedSelectedValue || autoridadSelect.value;
            autoridadSelect.innerHTML = '';
            CONFIG.SELECT_COLUMNS['AUTORIDAD'].forEach(v => {
              const o = document.createElement('option');
              o.value = v;
              o.textContent = v;
              autoridadSelect.appendChild(o);
            });

            // Restaurar valor anterior si existe
            let found = false;
            Array.from(autoridadSelect.options).forEach(opt => {
              if (opt.value.trim().toUpperCase() === currentVal.trim().toUpperCase() && currentVal !== '') {
                opt.selected = true;
                found = true;
              }
            });

            // Si no encontramos, dejar el primero (vac\u00edo)
            if (!found && autoridadSelect.options.length > 0) {
              autoridadSelect.options[0].selected = true;
            }

            // IMPORTANTE: Actualizar secretario/correo DIRECTAMENTE (sin dispatchEvent)
            // para evitar que el evento bubbling afecte otros inputs del formulario (ej: FECHA ALTA)
            const selectedVal = autoridadSelect.value.trim().toUpperCase();
            const info = autoridadesConfig[selectedVal] || { secretario: '', correo: '' };
            const secInput = document.getElementById('SECRETARIO');
            const mailInput = document.getElementById('CORREO SECRETARIO');
            if (secInput && info.secretario) secInput.value = info.secretario;
            if (mailInput && info.correo) mailInput.value = info.correo;
            const hiddenSec = document.getElementById('hidden_SEC');
            const hiddenMail = document.getElementById('hidden_MAIL');
            if (hiddenSec && info.secretario) hiddenSec.value = info.secretario;
            if (hiddenMail && info.correo) hiddenMail.value = info.correo;
          }
        })
        .withFailureHandler(err => console.error("Error al refrescar AUTORIDADES: " + err))
        .getAutoridadesList(ts);
    }

    function loadData(isSilent = false) {
      if (loadingSpinner && !isSilent) loadingSpinner.style.display = 'block';
      if (!isSilent) updateSyncStatus('syncing');

      let filterOptions = { type: 'recent' };
      if (mesSelect && anioSelect) {
        const m = mesSelect.value;
        const y = anioSelect.value;
        if (m === 'all') {
          filterOptions = { type: 'period', year: y, month: 'all_months' }; // Custom logic
        } else if (m !== 'recent') {
          filterOptions = { type: 'period', month: m, year: y };
        }
      }

      console.log("Cargando datos con opciones:", filterOptions);

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(response => {
            try {
              if (!response) throw new Error('Respuesta nula.');
              if (!response.success) throw new Error(response.message);

              // Comparar datos para ver si es necesario re-renderizar
              const oldDataString = JSON.stringify(originalData);
              const newDataString = JSON.stringify(response.data || []);
              const hasChanged = oldDataString !== newDataString;

              originalData = response.data || [];
              currentHeaders = response.headers || [];
              hiddenHeaders = response.hiddenHeaders || [];
              autoridadesConfig = response.autoridadesConfig || {};

              if (hasChanged) {
                console.log("Detectados cambios en los datos, re-renderizando...");
                // No aplicar filtro, mostrar todos los datos inicialmente
                filteredData = [...originalData];
                updatePaginationControls();
                renderTable(currentHeaders, filteredData);
              }

              // Actualizar versión de datos para el polling
              google.script.run
                .withSuccessHandler(r => { if (r.success) currentDataVersion = r.version; })
                .checkDataVersion(filterOptions);

              // Iniciar verificación de integridad automática (Evaluadora y Comparadora)
              checkDataIntegrity();

              if (!isSilent) updateSyncStatus('success');
            } catch (e) {
              showMessage('Error: ' + e.message, true);
              updateSyncStatus('error', 'Error al sincronizar');
            } finally {
              if (loadingSpinner) loadingSpinner.style.display = 'none';
            }
          })
          .withFailureHandler(error => {
            showMessage('Error al cargar: ' + error.message, true);
            if (loadingSpinner) loadingSpinner.style.display = 'none';
            updateSyncStatus('error');
          })
          .getData(filterOptions);
      }
    }

    /**
     * Inicia el proceso de polling para auto-sincronización
     */
    function startAutoSync() {
      if (syncInterval) clearInterval(syncInterval);

      // Polling cada 60 segundos
      syncInterval = setInterval(() => {
        checkForUpdates();
      }, 60000);

      console.log("Auto-sincronización iniciada (60s)");
    }

    /**
     * Verifica si hay cambios en el servidor
     */
    function checkForUpdates() {
      if (editingRowIdx !== -1) return; // No auto-refrescar si hay un modal abierto/editando

      let filterOptions = { type: 'recent' };
      if (mesSelect && anioSelect) {
        filterOptions = {
          type: mesSelect.value === 'all' ? 'period' : (mesSelect.value === 'recent' ? 'recent' : 'period'),
          year: anioSelect.value,
          month: mesSelect.value === 'all' ? 'all_months' : mesSelect.value
        };
      }

      google.script.run
        .withSuccessHandler(r => {
          if (r.success && r.version !== currentDataVersion) {
            console.log("Cambio detectado vía polling. Refrescando...");
            updateSyncStatus('syncing', 'Detectando cambios...');
            loadData(true); // Carga silenciosa
            setTimeout(() => updateSyncStatus('success'), 3000); // Volver a éxito tras 3s
          } else {
            // Sigue sincronizado
            updateSyncStatus('success');
          }
        })
        .withFailureHandler(() => updateSyncStatus('error'))
        .checkDataVersion(filterOptions);
    }

    function updatePaginationControls() {
      const totalRows = filteredData.length;
      const totalPages = rowsPerPage === 'all' ? 1 : Math.ceil(totalRows / rowsPerPage);

      if (currentPage > totalPages) currentPage = totalPages || 1;

      pageInfo.textContent = `Página ${currentPage} de ${totalPages || 1}`;
      prevPageBtn.disabled = currentPage === 1;
      nextPageBtn.disabled = currentPage === totalPages || totalPages === 0;
      rowCountInfo.textContent = `(Total: ${totalRows} registros)`;
    }

    function renderTable(headers, data) {
      if (!tableHeadersRow || !tableBody) return;
      tableHeadersRow.innerHTML = '';
      tableBody.innerHTML = '';

      // Actualizar encabezados
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h || '';
        tableHeadersRow.appendChild(th);
      });

      // Paginación de los datos a mostrar
      let dataToShow = data;
      if (rowsPerPage !== 'all') {
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + parseInt(rowsPerPage);
        dataToShow = data.slice(start, end);
      }

      const bodyFragment = document.createDocumentFragment();
      dataToShow.forEach((rowData, index) => {
        // rowData: [...visibles, '', ...ocultas, originalIdx]
        const originalIdxIndex = headers.length + hiddenHeaders.length;
        const originalIdx = rowData[originalIdxIndex];

        const tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.className = 'fade-in';
        tr.style.animationDelay = (index * 0.02) + 's';

        tr.addEventListener('click', (e) => {
          if (e.target.closest('.option-button') || e.target.closest('.action-checkbox')) return;
          toggleRowExpansion(tr, rowData);
        });

        for (let i = 0; i < headers.length; i++) {
          const cellData = rowData[i];
          const hName = headers[i] || '';
          const td = document.createElement('td');

          if (hName === 'CHECK') {
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'action-checkbox';
            cb.checked = (cellData === true || String(cellData || '').toUpperCase() === 'TRUE');
            cb.dataset.originalIdx = originalIdx;
            cb.title = cb.checked ? 'Tildado (procesado). Click para destilar y habilitar acción.' : 'Destildado. Se procesará al ejecutar una acción.';
            // Guardar el cambio en el Sheet cuando el usuario tilda/destilda
            cb.addEventListener('change', function () {
              const idx = parseInt(this.dataset.originalIdx);
              const nuevoValor = this.checked;
              this.disabled = true;
              this.style.opacity = '0.5';
              const self = this;
              google.script.run
                .withSuccessHandler(() => {
                  self.disabled = false;
                  self.style.opacity = '1';
                  self.title = nuevoValor ? 'Tildado (procesado). Click para destilar y habilitar acción.' : 'Destildado. Se procesará al ejecutar una acción.';
                  showMessage(nuevoValor ? 'Fila marcada como procesada.' : 'Fila habilitada para procesar.');
                  // Actualizar originalData en memoria para que rowsToProcess refleje el cambio
                  const checkIdx = currentHeaders.indexOf('CHECK');
                  const originalIdxIndex = currentHeaders.length + hiddenHeaders.length;
                  const fila = originalData.find(r => r[originalIdxIndex] === idx);
                  if (fila && checkIdx >= 0) fila[checkIdx] = nuevoValor;
                })
                .withFailureHandler(err => {
                  self.checked = !nuevoValor; // revertir visualmente
                  self.disabled = false;
                  self.style.opacity = '1';
                  showMessage('Error al guardar estado: ' + err.message, true);
                })
                .updateCheckValue(idx, nuevoValor);
            });
            td.appendChild(cb);
            td.style.textAlign = 'center';
          } else if (hName === 'OPC') {
            const btnN = createOptBtn('N', 'preview-note', 'Previsualizar Nota', () => handlePreviewFile(rowData, 'NOTA'));
            const btnW = createOptBtn('W', 'preview-word', 'Previsualizar Contrato', () => handlePreviewFile(rowData, 'CONTRATO'));
            const btnT = createOptBtn('📄', 'preview-txt', 'Previsualizar Resolución', () => handlePreviewFile(rowData, 'RESOLUCION'));
            const btnE = createOptBtn('&#9998;', 'edit', 'Editar', (e) => handleEditClick(originalIdx));
            const btnR = createOptBtn('&#x21BB;', 'renew', 'Renovar Contrato', () => handleRenovarClick(originalIdx, rowData));
            const btnD = createOptBtn('&#128465;', 'delete', 'Eliminar', () => handleDeleteClick(originalIdx));

            td.appendChild(btnN); td.appendChild(btnW); td.appendChild(btnT); td.appendChild(btnE); td.appendChild(btnR); td.appendChild(btnD);
            td.style.minWidth = '195px';
          } else if (hName === 'ESTADO') {
            td.textContent = cellData;
            if (cellData) {
              // Normalizar quitando acentos para que coincida con el CSS (.status-resolucion)
              let normalized = String(cellData).toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
              let cls = 'status-' + normalized.replace(/\s+/g, '-');
              if (cellData.startsWith('Proceso')) cls = 'status-proceso';
              td.classList.add(cls);
            }
          } else if (hName === 'TOTAL') {
            const val = parseFloat(String(cellData || '').replace(/[^0-9.-]+/g, ''));
            if (!isNaN(val)) {
              td.textContent = "$" + val.toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
            } else {
              td.textContent = cellData;
            }
          } else {
            td.textContent = cellData;
          }
          tr.appendChild(td);
        }
        bodyFragment.appendChild(tr);
      });
      tableBody.appendChild(bodyFragment);
    }

    function createOptBtn(html, cls, title, onClick) {
      const b = document.createElement('button');
      b.className = 'option-button ' + cls;
      b.innerHTML = html;
      b.title = title;
      b.addEventListener('click', (e) => { e.stopPropagation(); onClick(e); });
      return b;
    }

    function toggleRowExpansion(tr, rowData) {
      const next = tr.nextElementSibling;
      if (next && next.classList.contains('detail-row')) {
        next.remove();
        tr.classList.remove('expanded');
      } else {
        const detailTr = document.createElement('tr');
        detailTr.className = 'detail-row';
        const detailTd = document.createElement('td');
        detailTd.colSpan = currentHeaders.length;
        const detailContent = document.createElement('div');
        detailContent.className = 'detail-content';

        // Mapeo de índices de campos ocultos
        const hiddenFieldsMap = {};
        hiddenHeaders.forEach((label, i) => {
          const val = rowData[currentHeaders.length + i];
          hiddenFieldsMap[label] = (val !== undefined && val !== '') ? val : '';
        });

        // Definir campos a mostrar en orden específico
        const fieldsToShow = [
          { field: 'CUOTA', label: 'CUOTAS' },

      renderTable(currentHeaders, filteredData);

    cancelButton.onclick = closeAllModals;
    cancelDeleteConfirmButton.onclick = closeAllModals;
    cancelGlobalActionButton.onclick = () => {
      resetGlobalActionModal();
      closeAllModals();
    };

    dataForm.onsubmit = (e) => {
      e.preventDefault();
      const fd = getFormData();

      // Campos requeridos solicitados por el usuario
      const required = ['AUTORIDAD', 'AUTOR', 'DNI', 'NOMBRES', 'APELLIDOS', 'FECHA ALTA', 'TAREAS', 'CUOTA', 'TOTAL', 'DOMICILIO', 'LOCALIDAD', 'CORREO SECRETARIO', 'SECRETARIO'];
      let missing = [];

      // Limpiar bordes rojos previos
      document.querySelectorAll('#dataForm input, #dataForm select').forEach(el => el.style.border = '');

      required.forEach(field => {
        // En el caso de SECRETARIO y CORREO SECRETARIO, el campo puede ser hidden o visible
        const val = fd[field];
        if (!val || String(val).trim() === '') {
          missing.push(field);
          const inputEl = document.getElementById(field);
          if (inputEl) inputEl.style.border = '2px solid red';
        }
      });

      if (missing.length > 0) {
        alert('Faltan campos obligatorios:\n' + missing.join(', '));
        return;
      }

      saveButton.disabled = true;
      saveButton.textContent = 'Guardando...';

      const notaPdfFile = document.getElementById('notaPdfFile');
      const hasFile = notaPdfFile && notaPdfFile.files && notaPdfFile.files.length > 0;

      const run = google.script.run
        .withSuccessHandler(r => {
          saveButton.disabled = false;
          saveButton.textContent = 'Guardar';

          if (r.success) {
            // Si hay un archivo PDF, subirlo a Google Drive
            if (hasFile) {
              const file = notaPdfFile.files[0];
              const reader = new FileReader();
              const recordId = r.newId || editingRowIdx; // Usar el nuevo ID si es creación, sino el ID de edición
              const autorNota = fd['AUTOR'] || '';
              reader.onload = (event) => {
                const base64Data = event.target.result.split(',')[1]; // Obtener solo la parte base64
                google.script.run
                  .withSuccessHandler(uploadResult => {
                    if (uploadResult.success) {
                      showMessage('Registro guardado y nota PDF subida: ' + uploadResult.message);
                    } else {
                      showMessage('Registro guardado. Advertencia al subir PDF: ' + uploadResult.message, true);
                    }
                    closeAllModals();
                    loadData();
                  })
                  .withFailureHandler(err => {
                    showMessage('Registro guardado pero error al subir PDF: ' + err.message, true);
                    closeAllModals();
                    loadData();
                  })
                  .uploadNotaPdf(base64Data, fd['APELLIDOS'], fd['AUTORIDAD'], recordId, autorNota);
              };
              reader.readAsDataURL(file);
            } else {
              showMessage(r.message);
              closeAllModals();
              loadData();
            }
          } else {
            showMessage(r.message, true);
          }
        })
        .withFailureHandler(err => {
          saveButton.disabled = false;
          saveButton.textContent = 'Guardar';
          showMessage(err.message, true);
        });

      if (editingRowIdx === -1) run.addRow(fd, currentUserAutor);
      else run.updateRow(editingRowIdx, fd, currentUserAutor);
    };

        if (tipoNota === 'Nota Alta Senado') {

          }
          required = ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'TOTAL', 'CUOTA', 'TAREAS', 'FECHA ALTA'];

        } else if (tipoNota === 'Nota Baja Senado') {

          }
          required = ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'FECHA BAJA', 'REQ'];
          requiereSexo = true;
        } else if (tipoNota === 'Nota Baja Vice') {

          }
          required = ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'FECHA BAJA', 'REQ'];

        } else if (tipoNota === 'Prórroga Senado') {

          }

          }
          required = ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'CUOTA'];

        let missing = [];

          }
        });

        if (missing.length > 0) {
          alert('Faltan datos requeridos:\n' + missing.join(', '));
          return;
        }

        btnGeneraNota.disabled = true;
        btnGeneraNota.textContent = 'Generando...';

        google.script.run
          .withSuccessHandler(r => {

            btnGeneraNota.textContent = 'Genera Nota';
            if (r.success) {
              alert(r.message);
              // closeAllModals(); // Opcional, si queremos que se cierre luego de generar
            } else {
              alert(r.message);
            }
          })
          .withFailureHandler(e => {
            btnGeneraNota.disabled = false;

            alert('Error al conectar: ' + e.message);

    function generateFormFields(rowData) {
      // Evitar ejecuciones simultáneas
      if (generatingForm) return;
      generatingForm = true;

      // Generar campos rápidamente con datos en caché
      generateFormFieldsContent(rowData);
      generatingForm = false;

      // Refrescar datos en background SIN bloquear la UI si fuera necesario, 
      // pero no llamamos a refreshTareasSelect() aquí porque pisa el valor cargado.
      setTimeout(() => {
        // Para AUTORIDADES: refrescar en background preservando el valor ya seleccionado
        const autoridadSelect = document.getElementById('AUTORIDAD');
        const currentAutoridadValue = autoridadSelect ? autoridadSelect.value : '';
        refreshAutoridadesSelect(currentAutoridadValue || undefined);
      }, 150); 

    }

        'FECHA ALTA': 'w-fecha',
        'FECHA DE ALTA': 'w-fecha',
        'TOTAL': 'w-total',

        'REQ': 'w-req',

        'CORREO SECRETARIO': 'w-flex',

        'DOMICILIO': 'w-flex',
        'LOCALIDAD': 'w-flex',

              if (mailInput) mailInput.value = info.correo || '';
              document.getElementById('hidden_SEC').value = info.secretario || '';
              document.getElementById('hidden_MAIL').value = info.correo || '';
            };

            select.name = h;

              refreshAutoridadesSelect(select.value);

                  .withSuccessHandler(r => {

                      showMessage(r.message, false);
                      refreshAutoridadesSelect();
                    } else {
                      alert('Error: ' + r.message);
                    }
                  })
                  .deleteAutoridadConfig(selected);

            btnContainer.appendChild(btnEdit);
            btnContainer.appendChild(btnDelete);
            btnContainer.appendChild(btnRefresh);
            wrapper.appendChild(select);
            wrapper.appendChild(btnContainer);

            wrapper.className = 'input-with-buttons';

            const btnContainer = document.createElement('div');
            btnContainer.className = 'action-buttons';

            const select = document.createElement('select');
            CONFIG.SELECT_COLUMNS[h].forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; select.appendChild(o); });
            select.style.flex = '1';
            select.style.minWidth = '0';

                    } else {

          if (h === 'DNI' || h === 'TOTAL') {
            input.maxLength = 8;

              this.value = this.value.replace(/[^0-9]/g, '').slice(0, 8);

          if (h === 'FECHA ALTA') {
            input.addEventListener('change', function () {
              if (this.value) {
                const parts = this.value.split('-');

                  this.value = `${parts[0]}-${parts[1]}-01`;
                  if (typeof showMessage === 'function') showMessage('La fecha de alta ha sido ajustada al día 1 del mes.', false);

            });

              const valStr = String(rowData[h]);
              const valToMatch = valStr.trim().toLowerCase();
              let matched = false;
              Array.from(targetInput.options).forEach(opt => {
                if (opt.value.trim().toLowerCase() === valToMatch) {
                  opt.selected = true;
                  matched = true;
                }
              });
              if (!matched && valStr.trim() !== '' && valStr !== 'undefined') {
                const customOpt = document.createElement('option');
                customOpt.value = valStr;
                customOpt.textContent = valStr;
                customOpt.selected = true;
                targetInput.appendChild(customOpt);
              }
            } else {
              // Intenta obtener el valor por el nombre exacto o por alias común
              let finalVal = rowData[h];

              if (!finalVal && (h === 'FECHA ALTA' || h === 'FECHA DE ALTA')) {
                 finalVal = rowData['FECHA ALTA'] || rowData['FECHA DE ALTA'] || rowData['FECHA_ALTA'];

                 finalVal = rowData['FECHA BAJA'] || rowData['FECHA DE BAJA'] || rowData['FECHA_BAJA'];
              }

              if (CONFIG.DATE_COLUMNS.includes(h) && finalVal) {
                const oldVal = finalVal;
                finalVal = formatDateForInput(finalVal);
                if (!finalVal && (h === 'FECHA ALTA' || h === 'FECHA DE ALTA')) {
                   console.error("Fallo de formateo en campo crítico:", { campo: h, valorRecibido: oldVal, rowData: rowData });

        row.fields.forEach(h => {
          if (fieldDivs[h]) {

            groupedFields.add(h);
            added = true;
          }
        });
        if (added) {
          formFields.appendChild(rowCtr);
        }

      editable.forEach(h => {
        if (!groupedFields.has(h) && fieldDivs[h]) {
          const extraRow = document.createElement('div');
          extraRow.className = 'form-row-flex';
          extraRow.appendChild(fieldDivs[h]);
          formFields.appendChild(extraRow);
        }
      });

      const s = document.createElement('input'); s.type = 'hidden'; s.id = 'hidden_SEC'; s.value = rowData['SECRETARIO'] || ''; formFields.appendChild(s);
      const m = document.createElement('input'); m.type = 'hidden'; m.id = 'hidden_MAIL'; m.value = rowData['CORREO SECRETARIO'] || ''; formFields.appendChild(m);

      // Aplicar visibilidad según tipo de nota al abrir el modal
      applyNotaFieldVisibility(tipoNotaSelect ? tipoNotaSelect.value : '');
    }

    // Campos que se deben mostrar según el tipo de nota seleccionado
    const CAMPOS_POR_NOTA = {
      'Nota Alta Senado': ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'TOTAL', 'CUOTA', 'TAREAS', 'FECHA ALTA', 'AUTORIDAD', 'AUTOR', 'SEXO', 'ESTADO', 'CORREO SECRETARIO', 'SECRETARIO'],
      'Nota Alta Vice': ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'TOTAL', 'CUOTA', 'TAREAS', 'FECHA ALTA', 'AUTORIDAD', 'AUTOR', 'SEXO', 'ESTADO', 'CORREO SECRETARIO', 'SECRETARIO'],
      'Nota Baja Senado': ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'FECHA BAJA', 'REQ', 'AUTORIDAD', 'AUTOR', 'SEXO', 'ESTADO', 'CORREO SECRETARIO', 'SECRETARIO'],
      'Nota Baja Vice': ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'FECHA BAJA', 'REQ', 'AUTORIDAD', 'AUTOR', 'SEXO', 'ESTADO', 'CORREO SECRETARIO', 'SECRETARIO'],
      'Prórroga Senado': ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'CUOTA', 'AUTORIDAD', 'AUTOR', 'SEXO', 'ESTADO', 'CORREO SECRETARIO', 'SECRETARIO'],
      'Prórroga Vice': ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'CUOTA', 'AUTORIDAD', 'AUTOR', 'SEXO', 'ESTADO', 'CORREO SECRETARIO', 'SECRETARIO'],
      'Nota DDJJ': ['NOMBRES', 'APELLIDOS', 'DNI', 'DOMICILIO', 'LOCALIDAD', 'CORREO LOCADOR', 'AUTOR', 'ESTADO'],
    };

    function applyNotaFieldVisibility(tipoNota) {
      const campos = CAMPOS_POR_NOTA[tipoNota];
      // Sin selecισn: mostrar todo
      formFields.querySelectorAll('.form-group').forEach(div => {
        const input = div.querySelector('input, select, textarea');
        if (!input || !input.name) return;
        if (!campos) {
          div.style.display = '';
        } else {
          div.style.display = campos.includes(input.name) ? '' : 'none';
        }
      });
      // Ocultar contenedores de fila (form-row-2col / form-row-3col) si todos sus hijos están ocultos
      formFields.querySelectorAll('.form-row-2col, .form-row-3col').forEach(row => {
        const allHidden = Array.from(row.querySelectorAll('.form-group')).every(d => d.style.display === 'none');
        row.style.display = allHidden ? 'none' : '';
      });
    }

    function getFormData() {
      const fd = {};
      formFields.querySelectorAll('input, select').forEach(i => { if (i.name) fd[i.name] = i.value; });
      if (editingRowIdx === -1) { 
        fd['CHECK'] = true; 
        fd['ESTADO'] = 'Pendiente'; 
        if (currentUserAutor) fd['AUTOR'] = currentUserAutor; // Asignar autor al crear
      } else {
        // Al editar, si AUTOR o CREA REGISTRO no están en el form (por estar EXCLUDED), preservarlos del registro original
        const row = originalData.find(r => String(r[currentHeaders.length + hiddenHeaders.length]) === String(editingRowIdx));
        if (row) {
          const hs = [...currentHeaders, ...hiddenHeaders];
          if (fd['AUTOR'] === undefined) {
             const autorIdx = hs.indexOf('AUTOR');
             if (autorIdx !== -1) fd['AUTOR'] = row[autorIdx];
          }
          if (fd['CREA REGISTRO'] === undefined) {
             const creaIdx = hs.indexOf('CREA REGISTRO');
             if (creaIdx !== -1) fd['CREA REGISTRO'] = row[creaIdx];
          }
        }
      }

      // Si el modal no generó inputs visibles para Secretario/Correo (ej: por estar excluidos), usar los hidden_SEC/MAIL como fallback
      if (fd['SECRETARIO'] === undefined) {
        fd['SECRETARIO'] = document.getElementById('hidden_SEC') ? document.getElementById('hidden_SEC').value : '';
      }
      if (fd['CORREO SECRETARIO'] === undefined) {
        fd['CORREO SECRETARIO'] = document.getElementById('hidden_MAIL') ? document.getElementById('hidden_MAIL').value : '';
      }
      return fd;
    }

    function handleEditClick(originalIdx) {
      editingRowIdx = originalIdx;
      modalTitle.textContent = 'Editar Registro';
      if (tipoNotaSelect) tipoNotaSelect.value = '';
      if (sexoNotaSelect) sexoNotaSelect.value = '';

      // Buscar la fila en los datos locales (APERTURA INMEDIATA — sin llamada al servidor)
      const rowIdxInArray = originalData.findIndex(r => String(r[currentHeaders.length + hiddenHeaders.length]) === String(originalIdx));
      if (rowIdxInArray === -1) {
        showMessage('Registro no encontrado en los datos locales.', true);
        return;
      }

      // Abrir el modal INMEDIATAMENTE con los datos locales (sin esperar al servidor)
      const row = originalData[rowIdxInArray];
      const obj = {};
      const hs = [...currentHeaders, ...hiddenHeaders];
      hs.forEach((h, i) => obj[h] = row[i]);
      console.log("Abriendo edición para ID:", originalIdx, "Objeto mapeado:", obj);
      generateFormFields(obj);
      showModal(dataModal);

      // Configurar listener de tipo de nota
      if (tipoNotaSelect) {
        tipoNotaSelect.onchange = () => applyNotaFieldVisibility(tipoNotaSelect.value);
      }

    }

    /**
     * Función Evaluadora y Comparadora: verifica que registros cargados no tengan campos críticos vacíos
     */
    function checkDataIntegrity() {
      if (!originalData.length) return;

      const idsWithIssues = originalData.filter(r => {
        const fechaAlta = r[currentHeaders.indexOf('FECHA ALTA')];
        return !fechaAlta || String(fechaAlta).trim() === '';
      }).map(r => r[0]);

      if (idsWithIssues.length > 0) {
        console.log("Iniciando reparación de integridad para " + idsWithIssues.length + " registros...");
        google.script.run
          .withSuccessHandler(response => {
            if (response.success && response.data.length > 0) {
              response.data.forEach(freshRow => {
                const freshId = freshRow[0];
                const localIdx = originalData.findIndex(r => String(r[0]) === String(freshId));
                if (localIdx !== -1) {
                  originalData[localIdx] = freshRow;
                }
              });
              // Refrescar tabla si estamos en la primera página
              if (currentPage === 1) renderTable(currentHeaders, filteredData);
              updateSyncStatus('success');
            }
          })
          .getLatestDataByIDs(idsWithIssues);
      } else {
        updateSyncStatus('success');
      }
    }

    // Función para manejar el click de Renovar desde la tabla
    function handleRenovarClick(originalIdx, rowData) {
      if (!confirm('\u00bfDeseas renovar este registro? Se crear\u00e1 una copia nueva al final de la tabla sin Fecha de Alta, n\u00famero de Requerimiento ni Autoridad.')) return;

      // Construir objeto con todos los campos del registro
      const obj = {};
      const hs = [...currentHeaders, ...hiddenHeaders];
      hs.forEach((h, i) => obj[h] = rowData[i]);

      // Limpiar campos que no se deben copiar: FECHA ALTA, REQ, AUTORIDAD, ESTADO y fechas de documentos
      const objParaRenew = Object.assign({}, obj);
      delete objParaRenew['FECHA ALTA'];
      delete objParaRenew['FECHA DE ALTA'];
      delete objParaRenew['REQ'];
      delete objParaRenew['AUTORIDAD'];
      delete objParaRenew['ESTADO'];
      if (currentUserAutor) objParaRenew['AUTOR'] = currentUserAutor; // Nuevo autor al renovar

      delete objParaRenew['GENERA CONTRATO'];
      delete objParaRenew['GENERA RESOLUCION'];
      delete objParaRenew['FECHA NOTIFICA'];
      delete objParaRenew['BAJA CONTRATO'];
      delete objParaRenew['FECHA BAJA'];
      delete objParaRenew['FECHA DE BAJA'];
      objParaRenew['CHECK'] = false; // La nueva fila empieza sin procesar

      google.script.run
        .withSuccessHandler(r => {
          if (r.success) {
            showMessage('Registro renovado con ID: ' + r.newId + '. Actualizando tabla...');
            // Forzar recarga con filtro 'all' para que aparezca el nuevo registro (sin FECHA ALTA)
            // independientemente del filtro de periodo activo en pantalla
            google.script.run
              .withSuccessHandler(response => {
                try {
                  if (!response || !response.success) return;
                  originalData = response.data || [];
                  currentHeaders = response.headers || [];
                  hiddenHeaders = response.hiddenHeaders || [];
                  filteredData = [...originalData];
                  currentPage = 1;
                  updatePaginationControls();
                  renderTable(currentHeaders, filteredData);
                  showMessage('\u2713 Registro renovado y tabla actualizada. ID: ' + r.newId);
                } catch (e) { console.error(e); }
              })
              .withFailureHandler(() => loadData()) // fallback
              .getData({ type: 'all' });
          } else {
            showMessage('Error al renovar: ' + r.message, true);
          }
        })
        .withFailureHandler(err => showMessage('Error al conectar: ' + err.message, true))
        .addRow(objParaRenew);
    }

    // El botón btnRenovarContrato del modal se oculta (la funcionalidad se movió a la tabla)
    if (btnRenovarContrato) {
      btnRenovarContrato.style.display = 'none';
    }

    function handleDeleteClick(originalIdx) {
      rowToDeleteIdx = originalIdx;
      showModal(confirmModal);
    }

    function handlePreviewFile(rowData, type) {
      const obj = {};
      [...currentHeaders, ...hiddenHeaders].forEach((h, i) => obj[h] = rowData[i]);
      showMessage('Buscando archivo...');

      // Abrir la pestaña de forma síncrona aquí evita que el navegador la bloquee por ser un "popup" asíncrono
      const previewWindow = window.open('', '_blank');
      if (previewWindow) {
        previewWindow.document.write('Cargando previsualización, por favor espere...');
      }

      google.script.run
        .withSuccessHandler(r => {
          if (r.success) {
            if (previewWindow) {
              previewWindow.location.href = r.url;
            } else {
              window.open(r.url, '_blank'); // fallback
            }
          } else {
            if (previewWindow) previewWindow.close();
            showMessage(r.message, true);
          }
        })
        .withFailureHandler(e => {
          if (previewWindow) previewWindow.close();
          showMessage('Error al conectar: ' + e.message, true);
        })
        .getFilePreviewUrl(obj, type);
    }

    confirmDeleteButton.onclick = () => {
      // --- Eliminación optimista: actualizar UI de inmediato ---
      const originalIdxMeta = currentHeaders.length + hiddenHeaders.length;
      const idxInOriginal = originalData.findIndex(r => String(r[originalIdxMeta]) === String(rowToDeleteIdx));
      if (idxInOriginal !== -1) {
        originalData.splice(idxInOriginal, 1);
        filteredData = filteredData.filter(r => r[originalIdxMeta] !== rowToDeleteIdx);
        // Si la página actual quedó vacía tras la eliminación, retroceder una página
        const totalPages = rowsPerPage === 'all' ? 1 : Math.ceil(filteredData.length / rowsPerPage);
        if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
        updatePaginationControls();
        renderTable(currentHeaders, filteredData);
      }
      closeAllModals();
      showMessage('Eliminando registro...');

      // --- Confirmar con el servidor en background ---
      google.script.run
        .withSuccessHandler(r => {
          if (r.success) {
            showMessage(r.message);
            loadData(true); // Sincronización silenciosa para actualizar IDs
          } else {
            showMessage('Error al eliminar: ' + r.message, true);
            loadData(); // Revertir si el servidor falló
          }
        })
        .withFailureHandler(err => {
          showMessage('Error de conexión: ' + err.message, true);
          loadData(); // Revertir
        })
        .deleteRow(rowToDeleteIdx);
    };

    function resetGlobalActionModal() {
      // Resetear estado del modal sin mostrarlo
      const actionContainer = document.getElementById('actionSelectionContainer');
      const progressContainer = document.getElementById('progressDisplay');
      const resultContainer = document.getElementById('resultDisplay');

      if (actionContainer) actionContainer.style.display = 'block';
      if (progressContainer) progressContainer.style.display = 'none';
      if (resultContainer) resultContainer.style.display = 'none';

      document.getElementById('progressBar').style.width = '0%';
      document.getElementById('progressPercent').textContent = '0%';
      document.getElementById('progressStatus').textContent = 'Preparando...';
      document.getElementById('executeGlobalActionButton').disabled = false;
      document.getElementById('executeGlobalActionButton').style.opacity = '1';
      document.getElementById('cancelGlobalActionButton').textContent = 'Cancelar';
      document.getElementById('cancelGlobalActionButton').style.display = 'block';
    }

    function openGlobalActionModal() {
      resetGlobalActionModal();

      if (globalActionSelect.options.length <= 1) {
        ['Contrato', 'Resolución', 'Baja', 'Notificación'].forEach(v => {
          const opt = document.createElement('option'); opt.value = v; opt.textContent = v; globalActionSelect.appendChild(opt);
        });
      }
      showModal(globalActionModal);
    }

    let isRunning = false; // Flag para evitar ejecuciones concurrentes

    executeGlobalActionButton.onclick = async () => {
      if (isRunning) return; // Evitar doble click
      const type = globalActionSelect.value;
      if (!type) return showMessage('Selecciona acción', true);

      // Encontrar registros seleccionados para validar antes de empezar
      const checkIdx = currentHeaders.indexOf('CHECK');
      const rowsToProcess = originalData.filter(row => {
        const val = row[checkIdx];
        return (val === false || val === '' || val === null || val === undefined || val === 'FALSE');
      });

      if (rowsToProcess.length === 0) {
        alert("No hay registros seleccionados para procesar. Por favor, DESMARCA (destilda) la casilla 'CHECK' de las filas que deseas procesar y luego usa este botón.");
        return showMessage("No hay registros sin procesar (CHECK destildado).", true);
      }

      // Validación para el campo REQ en caso de acción "Baja" o "Resolución"
      if (type === 'Baja' || type === 'Resolución') {
        const allHeaders = [...currentHeaders, ...hiddenHeaders];
        const reqIdx = allHeaders.indexOf('REQ');
        if (reqIdx !== -1) {
          const rowsMissingReq = rowsToProcess.filter(row => !row[reqIdx] || String(row[reqIdx]).trim() === '');
          if (rowsMissingReq.length > 0) {
            alert(`No se puede procesar la acción "${type}" porque hay ${rowsMissingReq.length} registro(s) que no tienen el número de REQUERIMIENTO (REQ).`);
            return;
          }
        }
      }

      // Preparar UI del modal para progreso
      const actionSelectionContainer = document.getElementById('actionSelectionContainer');
      const progressDisplay = document.getElementById('progressDisplay');
      const progressBar = document.getElementById('progressBar');
      const progressStatus = document.getElementById('progressStatus');
      const progressPercent = document.getElementById('progressPercent');

      // Limpiar resultados previos
      let resultDisplay = document.getElementById('resultDisplay');
      if (resultDisplay) {
        resultDisplay.style.display = 'none';
        const errorDetailsContainer = document.getElementById('errorDetailsContainer');
        if (errorDetailsContainer) errorDetailsContainer.innerHTML = '';
      }

      isRunning = true;
      actionSelectionContainer.style.display = 'none';
      progressDisplay.style.display = 'block';
      executeGlobalActionButton.disabled = true;
      executeGlobalActionButton.style.opacity = '0.5';
      cancelGlobalActionButton.style.display = 'none';

      progressStatus.textContent = `Procesando lote (${rowsToProcess.length} registros)...`;
      progressBar.style.width = '50%';
      progressPercent.textContent = '50%';

      try {
        // Llamada única: pasamos los IDs ya filtrados desde el frontend
        const idsToProcess = rowsToProcess.map(row => row[currentHeaders.length + hiddenHeaders.length]);
        const result = await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .executeBulkActionByIDs(idsToProcess, type, currentUserAutor);
        });

        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        progressStatus.textContent = 'Proceso completado.';

        // Finalizar: mostrar resultados y boton Cerrar
        isRunning = false;
        resultDisplay = document.getElementById('resultDisplay');
        resultDisplay.style.display = 'block';
        
        // El backend devuelve successCount y errors array (si refactorizamos executeBulkAction para devolver detalles)
        // Por ahora usamos lo que ya tiene: count y message.
        document.getElementById('successCountText').textContent = result.count || 0;
        
        if (result.success) {
          document.getElementById('errorCountText').textContent = '0';
          showMessage(result.message);
        } else {
          // Si falló o hubo errores parciales
          if (result.errors && result.errors.length > 0) {
            document.getElementById('errorCountText').textContent = result.errors.length;
            let errorDetailsContainer = document.getElementById('errorDetailsContainer');
            if (!errorDetailsContainer) {
              errorDetailsContainer = document.createElement('div');
              errorDetailsContainer.id = 'errorDetailsContainer';
              errorDetailsContainer.style.marginTop = '10px';
              errorDetailsContainer.style.maxHeight = '150px';
              errorDetailsContainer.style.overflowY = 'auto';
              errorDetailsContainer.style.color = '#b91c1c';
              errorDetailsContainer.style.fontSize = '0.75rem';
              errorDetailsContainer.style.borderTop = '1px solid #e2e8f0';
              errorDetailsContainer.style.paddingTop = '5px';
              resultDisplay.appendChild(errorDetailsContainer);
            }
            errorDetailsContainer.innerHTML = result.errors.map(err => `<div>${err}</div>`).join('');
          } else {
            document.getElementById('errorCountText').textContent = '1';
            showMessage(result.message, true);
          }
        }

      } catch (err) {
        console.error('Error en proceso por lotes:', err);
        isRunning = false;
        resultDisplay.style.display = 'block';
        document.getElementById('errorCountText').textContent = '1';
        showMessage("Error de conexión: " + (err.message || 'Desconocido'), true);
      }

      // Cambiar botones al finalizar
      executeGlobalActionButton.style.display = 'none';
      const closeBtn = document.getElementById('cancelGlobalActionButton');
      closeBtn.textContent = 'Cerrar';
      closeBtn.style.display = 'block';
      closeBtn.onclick = () => {
        dataModal.style.display = 'none'; // cerrar modal principal si es necesario
        globalActionModal.style.display = 'none';
        loadData(); // Refrescar tabla al final
      };
    };



    loadData();
    google.script.run.withSuccessHandler(r => { 
      if (r.success) {
        auxDataMap = r.data;
        autoridadesConfig = r.data;
        if (r.autores && r.autores.length > 0) {
          CONFIG.SELECT_COLUMNS['AUTOR'] = ['', ...r.autores];
        }
      } 
    }).getAuxData();

    google.script.run.withSuccessHandler(r => {
      currentUserRole = r.role;
      currentUserAutor = r.autor; 
      console.log("Sesión activa:", { rol: currentUserRole, autor: currentUserAutor });
      if (!currentUserAutor && (currentUserRole === 'ADMIN' || currentUserRole === 'SUPERVISOR')) {
        showMessage('⚠️ ATENCIÓN: No tienes asignado un CÓDIGO DE AUTOR. Tus acciones se guardarán sin tus iniciales. Solicita a un administrador que asigne tu código en la gestión de usuarios.', true);
      }
    }).getUserRoleForFrontend();

    // Iniciar auto-sincronización
    startAutoSync();
  });

  // --- MODAL GESTIÓN DE AUTORIDADES ---
  function openAutoridadAddDialog() {
    const apellido = prompt('Apellido (ej: SERRA)');
    if (!apellido) return;

    const nombreCompleto = prompt('Nombre completo');
    if (!nombreCompleto) return;

    const secretario = prompt('Secretario/a');
    if (!secretario) return;

    const correo = prompt('Correo del secretario');
    if (!correo) return;

    google.script.run
      .withSuccessHandler(r => {
        if (r.success) {
          showMessage('Autoridad agregada: ' + apellido, false);
          refreshAutoridadesSelect();
        } else {
          alert('Error: ' + r.message);
        }
      })
      .addAutoridadConfig(apellido.trim(), nombreCompleto.trim(), secretario.trim(), correo.trim());
  }

  function openAutoridadEditDialog(apellido, info) {
    const newApellido = prompt('Nombre Autoridad (Apellido):', apellido || '');
    if (newApellido === null) return;

    const secretario = prompt('Secretario/a:', info.secretario || '');
    if (secretario === null) return;

    const correo = prompt('Correo:', info.correo || '');
    if (correo === null) return;

    if (!newApellido.trim() || !secretario.trim() || !correo.trim()) {
      alert('Completa todos los campos');
      return;
    }

    google.script.run
      .withSuccessHandler(r => {
        if (r.success) {
          showMessage('Autoridad actualizada', false);
          refreshAutoridadesSelect(newApellido.trim().toUpperCase());
        } else {
          alert('Error: ' + r.message);
        }
      })
      .updateAutoridadConfig(apellido, newApellido.trim(), secretario.trim(), correo.trim());
  }


</script>
