<style>
  :root {
    --primary-bg: #0b1121;
    /* Midnight deeper */
    --secondary-bg: #161e2e;
    --modal-bg: #fdfbf7;
    /* Crema Suave (Papel Premium) */
    --modal-text: #2c3e50;
    --accent-amber: #d97706;
    --accent-gold: #f59e0b;
    --accent-blue: #3b82f6;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --table-bg: #ffffff;
    --header-bg: #1e293b;

    --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Animaciones Globales */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .fade-in {
    animation: fadeInUp 0.5s ease-out forwards;
  }

  /* Skeleton Loader */
  @keyframes shimmer {
    0% {
      background-position: -468px 0;
    }

    100% {
      background-position: 468px 0;
    }
  }

  .skeleton {
    background: #f6f7f8;
    background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
    background-repeat: no-repeat;
    background-size: 800px 104px;
    display: inline-block;
    position: relative;
    animation-duration: 1.5s;
    animation-fill-mode: forwards;
    animation-iteration-count: infinite;
    animation-name: shimmer;
    animation-timing-function: linear;
    border-radius: 4px;
  }

  /* Estilos para el botón "+" de tareas */
  .input-with-button {
    display: flex;
    align-items: center;
    gap: 4px;
    width: 100%;
  }

  .autoridad-container {
    gap: 4px;
  }

  .autoridad-container select {
    flex: 1;
    min-width: 100px;
  }

  .add-item-btn {
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 0 8px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .add-item-btn:hover {
    background: #2563eb;
  }

  .tarea-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .delete-icon-container {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    animation: shake 0.6s ease-in-out infinite alternate;
  }

  @keyframes shake {
    0% {
      transform: scale(1);
    }

    100% {
      transform: scale(1.1);
    }
  }

  .small-modal {
    text-align: center;
    padding: 30px !important;
  }

  /* Elegant Spinner */
  .elegant-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    border-top-color: var(--accent-gold);
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  /* Estilos generales */
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top right, #1e293b, #0f172a);
    background-attachment: fixed;
    color: var(--text-primary);
    overflow-x: hidden;
  }

  /* Encabezado */
  .header {
    background: rgba(11, 17, 33, 0.7);
    padding: 10px 15px;
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--glass-border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .title {
    color: var(--text-primary);
    font-size: 1em;
    font-weight: 900;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: linear-gradient(to right, #f1f5f9, #94a3b8);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Controles */
  .controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .add-button {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75em;
    font-weight: 600;
    transition: all 0.2s;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
  }

  .add-button:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
    filter: brightness(1.1);
  }

  /* Accesos directos a Drive */
  .drive-shortcuts {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 6px;
    background: var(--glass-bg);
    border-radius: 8px;
    border: 1px solid var(--glass-border);
    max-width: fit-content;
  }

  .shortcuts-label {
    color: #fbbf24;
    font-size: 0.7em;
    font-weight: 700;
    text-transform: uppercase;
    align-self: center;
  }

  .shortcut-link {
    background: rgba(255, 255, 255, 0.9);
    color: #1e293b;
    padding: 4px 10px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 0.7em;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .shortcut-link:hover {
    background: #fbbf24;
    color: #000;
    transform: scale(1.05);
  }

  /* Secondary Controls (Buscador y Folders) */
  .secondary-controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    align-items: center;
    gap: 15px;
    max-width: 100%;
    margin: 6px 0 0 0;
  }

  .search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 4px 10px;
    width: 250px;
    transition: border-color 0.2s;
  }

  .search-wrapper:focus-within {
    border-color: var(--accent-blue);
    background: rgba(255, 255, 255, 0.08);
  }

  .search-icon {
    font-size: 0.8em;
    margin-right: 8px;
    opacity: 0.6;
  }

  .search-input {
    background: transparent;
    border: none;
    color: white;
    font-size: 0.85em;
    width: 100%;
    outline: none;
  }

  /* Sync Indicator Pulse */
  @keyframes pulse {
    0% {
      opacity: 0.4;
    }

    50% {
      opacity: 1;
    }

    100% {
      opacity: 0.4;
    }
  }

  #syncIndicator.syncing {
    animation: pulse 2s infinite ease-in-out;
  }

  #syncIndicator.sync-success {
    color: #10b981 !important;
  }

  #syncIndicator.sync-error {
    color: #ef4444 !important;
  }

  /* Selector de Período Integrado */
  .period-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 6px 16px;
    backdrop-filter: blur(10px);
    transition: var(--transition-smooth);
  }

  .period-selector:hover {
    border-color: var(--accent-gold);
    background: var(--glass-highlight);
  }

  .period-label {
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--accent-gold);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .period-selector select {
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-size: 0.85rem;
    font-weight: 600;
    outline: none;
    cursor: pointer;
    padding: 2px 4px;
  }

  .period-selector select option {
    background: var(--secondary-bg);
    color: white;
  }

  /* Contenedor de la tabla */
  .table-container {
    background: var(--table-bg);
    margin: 0 15px 20px 15px;
    border-radius: 16px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    overflow: auto;
    max-height: 75vh;
    border: 1px solid rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(5px);
    transition: var(--transition-smooth);
  }

  /* Tabla Premium */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    color: #334155;
  }

  /* Cabecera Fija (Sticky) */
  .data-table th {
    position: sticky;
    top: 0;
    z-index: 50;
    background: #151c2e;
    color: #f1f5f9;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 14px 10px;
    text-align: left;
    white-space: nowrap;
    border-bottom: 2px solid var(--accent-gold);
    user-select: none;
    font-size: 9px;
  }

  .data-table td {
    padding: 10px 10px;
    border-bottom: 1px solid #f1f5f9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
    transition: var(--transition-smooth);
  }

  /* Ajustes específicos de columnas para optimizar espacio */
  .data-table th:nth-child(2),
  .data-table td:nth-child(2) {
    max-width: 140px;
  }

  /* AUTORIDAD */
  .data-table th:nth-child(6),
  .data-table td:nth-child(6) {
    max-width: 200px;
  }

  /* TAREAS */
  .data-table th:nth-child(10),
  .data-table td:nth-child(10) {
    max-width: 120px;
  }

  /* DOMICILIO */
  .data-table th:nth-child(11),
  .data-table td:nth-child(11) {
    max-width: 100px;
  }

  /* LOCALIDAD */
  .data-table th:nth-child(12),
  .data-table td:nth-child(12) {
    max-width: 100px;
  }

  /* REQ */

  /* Columnas cortas se mantienen estrechas */
  .data-table th:nth-child(1),
  .data-table td:nth-child(1) {
    width: 40px;
    text-align: center;
  }

  /* ID */
  .data-table th:nth-child(5),
  .data-table td:nth-child(5) {
    width: 80px;
  }

  /* DNI */

  .data-table tr:hover {
    background-color: #f8fafc;
  }

  /* Estados */
  .status-pendiente {
    background: #fc0404;
    color: #ffffff;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.85em;
  }

  .status-contrato {
    background: #6ce9ff;
    color: #000000;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.85em;
  }

  .status-resolucion {
    background: #fee925;
    color: #000000;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.85em;
  }

  .status-baja {
    background: #8672fb;
    color: #ffffff;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.85em;
  }

  .status-notificado {
    background: #67fe74;
    color: #000000; /* Texto negro para mejor contraste con verde claro */
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.85em;
  }

  /* Opciones */
  .option-button {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 4px;
    border-radius: 4px;
    transition: transform 0.1s;
  }

  .option-button:hover {
    transform: scale(1.2);
    background: rgba(0, 0, 0, 0.05);
  }

  .option-button.preview-note {
    color: #8b5cf6; /* Púrpura para Notas */
  }

  .option-button.preview-word {
    color: #2563eb; /* Azul para Contratos */
  }

  .option-button.preview-txt {
    color: #f59e0b; /* Ambar para Resoluciones */
  }

  .option-button.edit {
    color: #059669;
  }

  .option-button.renew {
    color: #0ea5e9;
    font-size: 1.2rem;
    font-weight: bold;
  }

  .option-button.renew:hover {
    color: #0284c7;
    transform: scale(1.25) rotate(-20deg);
  }

  .option-button.delete {
    color: #dc2626;
  }

  /* Checkbox Custom */
  .checkbox-container {
    display: flex;
    justify-content: center;
  }

  .action-checkbox {
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  /* Scrollbar personalizado */
  .table-container::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  .table-container::-webkit-scrollbar-track {
    background: #f1f5f9;
  }

  .table-container::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 4px;
  }

  .table-container::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
  }

  /* Modales Estética Premium */
  .modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(4px);
    justify-content: center;
  }

  .modal-content {
    background: var(--modal-bg);
    color: var(--modal-text);
    margin: 1vh auto;
    border-radius: 12px;
    padding: 0;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(0, 0, 0, 0.1);
    width: 95%;
    max-width: 800px;
    position: relative;
    max-height: 80vh;
    display: block;
    overflow-y: auto;
    animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .small-modal {
    text-align: center;
    padding: 30px !important;
    max-width: 400px !important;
    width: 20%;
    margin: 10vh auto;
    height: 300px;
    /* <--- Ajusta este valor (ej: 300px, 400px, 50vh) */
  }



  .w-estado {
    width: calc(15ch + 30px);
    /* Ajusta este valor si necesitas más o menos espacio */
    min-width: 120px;
  }

  .form-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 15px;
    border-bottom: 1px solid #e0e0e0;
  }

  .form-header h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent-amber);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .form-body {
    padding: 10px 15px;
  }

  .close-button {
    position: absolute;
    top: 8px;
    right: 12px;
    color: var(--text-secondary);
    font-size: 1.5rem;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.2s, transform 0.2s;
    line-height: 1;
  }

  .close-button:hover,
  .close-button:focus {
    color: #ef4444;
    text-decoration: none;
    transform: scale(1.1);
  }

  /* Estados de foco y Botones */
  .form-body input,
  .form-body select,
  .form-body textarea {
    background: #ffffff;
    border: 1px solid #ddd;
    color: #1e293b;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    transition: all 0.2s;
    box-sizing: border-box;
    width: 100%;
  }

  .form-body input:focus,
  .form-body select:focus {
    outline: none;
    border-color: #3498db;
    box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
  }

  .modal-content input:focus,
  .modal-content select:focus,
  .modal-content textarea:focus {
    background: #ffffff;
    border-color: var(--accent-amber);
    box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.1);
    outline: none;
  }

  .form-body label {
    color: #2c3e50;
    font-weight: 600;
    margin-bottom: 2px;
    display: block;
    font-size: 11px;
    text-transform: uppercase;
  }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    border-top: 1px solid var(--glass-border);
    padding-top: 6px;
    margin-top: 4px;
    margin-bottom: 2px;
  }

  /* === FOOTER Y BOTONES PRINCIPALES === */
  .form-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid #e0e0e0;
  }

  .file-upload {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .file-upload label {
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 11px;
  }

  .footer-buttons {
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }

  .btn-primary {
    background: #3498db;
  }

  .btn-secondary {
    background: #95a5a6;
  }

  .btn-success {
    background: #2c3e50;
  }

  .btn:hover {
    opacity: 0.9;
  }

  .save-button:hover,
  .cancel-button:hover,
  .execute-button:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
  }

  /* Progress Bar */
  .progress-container {
    width: 100%;
    background-color: #f1f5f9;
    border-radius: 6px;
    margin: 10px 0;
    /* Reducido de 20px */
    height: 14px;
    /* Un poco más gruesa */
    overflow: hidden;
    display: none;
    border: 1px solid #e2e8f0;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #10b981, #10b981);
    /* Color sólido más vivo */
    box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
    transition: width 0.1s linear;
    /* Más rápido */
  }

  .progress-text {
    font-size: 0.8rem;
    color: #475569;
    margin-bottom: 5px;
    font-weight: 600;
  }

  .execute-button {
    background: #10b981;
    color: #ffffff;
    border: none;
    padding: 8px 20px;
    /* Reducido */
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.9rem;
    /* Reducido */
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-top: 5px;
    /* Reducido */
    box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3);
  }

  .modal-content label {
    font-size: 0.6rem;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    margin-bottom: 1px;
  }

  /* Grid en modal */
  #formFields {
    display: flex;
    flex-direction: column;
    width: 100%;
    margin-bottom: 0;
  }

  /* === GRID Y FILAS PERSONALIZADAS (Usuario) === */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }

  .form-row-flex {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    align-items: flex-end;
  }

  .form-row-single {
    margin-bottom: 6px;
  }

  .col-1 {
    grid-column: span 1;
  }

  .col-2 {
    grid-column: span 2;
  }

  .col-3 {
    grid-column: span 3;
  }

  .col-4 {
    grid-column: span 4;
  }

  /* === ANCHOS PERSONALIZADOS DEL USUARIO === */
  .w-sexo {
    width: 15%;
    min-width: 80px;
  }

  .w-dni {
    width: calc(10ch + 24px);
    min-width: 100px;
  }

  .w-flex {
    flex: 1;
    min-width: 120px;
  }

  .w-fecha {
    width: auto;
    min-width: 140px;
  }

  .w-fecha input[type="date"] {
    width: auto;
    min-width: 130px;
  }

  .w-total {
    width: calc(12ch + 24px);
    min-width: 120px;
  }

  .w-cuota {
    width: calc(3ch + 40px);
    min-width: 70px;
  }

  .w-req {
    width: calc(7ch + 24px);
    min-width: 80px;
  }

  .w-autor {
    width: calc(5ch + 40px);
    min-width: 80px;
  }

  .w-tipo-nota {
    width: calc(15ch + 40px);
    min-width: 150px;
  }

  /* Grupos de formulario */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    box-sizing: border-box;
  }

  .form-group label {
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    color: #64748b;
  }

  /* Eliminar duplicado anterior */

  .input-with-buttons {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  .input-with-buttons select {
    flex: 1;
    min-width: 0;
  }

  .action-buttons {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .btn-action {
    width: 26px;
    height: 26px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter 0.2s;
  }

  .btn-action:hover {
    filter: brightness(1.1);
  }

  .btn-action.blue {
    background: #3b82f6;
  }

  .btn-action.orange {
    background: #f59e0b;
  }

  .btn-action.red {
    background: #ef4444;
