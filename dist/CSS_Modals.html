<style>
  .modal {
    display: none; position: fixed; z-index: 2000;

  }
   .modal-content {
    background: #1e293b; color: #f1f5f9;
    margin: 5vh auto; border-radius: 16px; padding: 0;

    position: relative; max-height: 90vh; overflow-y: auto;

  }

  .w-autor { flex: 0 0 180px; }
